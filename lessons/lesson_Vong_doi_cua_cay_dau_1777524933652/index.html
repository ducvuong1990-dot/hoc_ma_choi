<!DOCTYPE html>
<html lang="vi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bài giảng EduPlay</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Be+Vietnam+Pro:wght@500;700;800;900&family=Inter:wght@500;700;800;900&display=swap"
    rel="stylesheet">
  <script src="../../node_modules/canvas-confetti/dist/confetti.browser.js"></script>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 12%, rgba(34, 242, 210, .24), transparent 28%),
        radial-gradient(circle at 86% 16%, rgba(255, 138, 92, .22), transparent 26%),
        linear-gradient(135deg, #f8fdff 0%, #e7f8ff 52%, #fff3dc 100%);
      color: #142033;
      font-family: "Be Vietnam Pro", Inter, system-ui, sans-serif;
      text-rendering: optimizeLegibility;
      -webkit-font-smoothing: antialiased;
    }

    .app-container {
      display: grid;
      grid-template-rows: minmax(0, 1fr) auto;
      width: 100vw;
      height: 100vh;
    }

    .slide-area {
      position: relative;
      display: grid;
      place-items: center;
      min-height: 0;
      padding: 72px 32px 24px;
      overflow: hidden;
    }

    .slide-img {
      display: none;
      width: min(1280px, 94vw);
      max-height: calc(100vh - 300px);
      aspect-ratio: 16 / 9;
      object-fit: contain;
      border: 1px solid rgba(255, 255, 255, .82);
      border-radius: 28px;
      background: #fff;
      box-shadow: 0 26px 70px rgba(23, 78, 121, .22);
    }

    .slide-img.active {
      display: block;
      animation: fadeIn .35s ease both;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(12px) scale(.985);
      }

      to {
        opacity: 1;
        transform: translateY(0) scale(1);
      }
    }

    .script-area {
      min-height: 230px;
      padding: 22px clamp(18px, 5vw, 72px);
      border-top: 1px solid rgba(255, 255, 255, .78);
      background: rgba(255, 255, 255, .72);
      box-shadow: 0 -18px 60px rgba(23, 78, 121, .14);
      backdrop-filter: blur(18px);
    }

    .script-text {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      align-content: center;
      gap: 8px 10px;
      min-height: 124px;
      max-width: 1180px;
      margin: 0 auto;
      color: #25364a;
      font-size: clamp(24px, 3vw, 34px);
      font-weight: 800;
      line-height: 1.55;
      text-align: center;
    }

    .word {
      display: inline-block;
      padding: 0 3px;
      border-radius: 10px;
      transition: color .12s ease, background .12s ease, transform .12s ease;
    }

    .word.highlight {
      color: #7a4a00;
      background: #ffe46b;
      transform: translateY(-2px) scale(1.08);
      box-shadow: 0 10px 22px rgba(253, 211, 77, .26);
    }

    .controls,
    .indicator {
      position: fixed;
      z-index: 50;
      border: 1px solid rgba(255, 255, 255, .78);
      background: rgba(255, 255, 255, .72);
      box-shadow: 0 14px 34px rgba(23, 78, 121, .16);
      backdrop-filter: blur(16px);
    }

    .controls {
      top: 18px;
      left: 50%;
      display: flex;
      gap: 10px;
      padding: 10px;
      border-radius: 999px;
      transform: translateX(-50%);
    }

    .btn {
      display: inline-grid;
      place-items: center;
      min-width: 48px;
      height: 48px;
      padding: 0 16px;
      border: 0;
      border-radius: 999px;
      background: #e8f7ff;
      color: #075985;
      cursor: pointer;
      font: inherit;
      font-weight: 900;
    }

    .btn.primary {
      background: linear-gradient(145deg, #a7f36d, #48d5ff);
      color: #083344;
    }

    .btn:disabled {
      opacity: .46;
      cursor: not-allowed;
    }

    .indicator {
      top: 26px;
      right: 28px;
      padding: 12px 18px;
      border-radius: 999px;
      color: #075985;
      font-weight: 900;
    }

    .loading-screen {
      position: fixed;
      inset: 0;
      z-index: 1000;
      display: grid;
      place-items: center;
      background: #f8fdff;
      color: #075985;
    }

    .lesson-coach-3d {
      position: fixed;
      right: clamp(14px, 3vw, 34px);
      bottom: 104px;
      z-index: 90;
      width: min(230px, 34vw);
      min-width: 150px;
      padding: 12px;
      border: 1px solid rgba(255, 255, 255, .78);
      border-radius: 28px;
      background: linear-gradient(145deg, rgba(255, 255, 255, .88), rgba(232, 247, 255, .78));
      box-shadow: 0 22px 58px rgba(23, 78, 121, .22);
      backdrop-filter: blur(16px);
      transform-style: preserve-3d;
    }

    .coach-bubble {
      margin-bottom: 8px;
      padding: 10px 12px;
      border-radius: 18px 18px 6px 18px;
      background: #142033;
      color: #fff;
      font-size: 14px;
      font-weight: 900;
      line-height: 1.35;
    }

    .coach-model-3d {
      position: relative;
      height: 160px;
      border-radius: 24px;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 78%, rgba(72, 213, 255, .28), transparent 34%),
        linear-gradient(160deg, #fff7d6, #e8f7ff 72%);
      perspective: 680px;
    }

    .coach-shadow {
      position: absolute;
      left: 50%;
      bottom: 18px;
      width: 78px;
      height: 18px;
      border-radius: 999px;
      background: rgba(20, 32, 51, .16);
      filter: blur(2px);
      transform: translateX(-50%);
    }

    .coach-character {
      position: absolute;
      left: 50%;
      bottom: 24px;
      width: 96px;
      height: 112px;
      transform: translateX(-50%) rotateY(-16deg) rotateX(4deg);
      transform-style: preserve-3d;
      animation: coachFloat 3.2s ease-in-out infinite;
    }

    .coach-head,
    .coach-body,
    .coach-ear,
    .coach-arm {
      position: absolute;
      background: linear-gradient(145deg, #c58a54, #8a5a34);
      box-shadow: inset -10px -12px 18px rgba(65, 34, 12, .18), inset 8px 8px 14px rgba(255, 255, 255, .24);
      transform-style: preserve-3d;
    }

    .coach-head {
      left: 17px;
      top: 0;
      width: 62px;
      height: 56px;
      border-radius: 28px 30px 24px 24px;
    }

    .coach-body {
      left: 11px;
      top: 50px;
      width: 74px;
      height: 58px;
      border-radius: 32px 32px 24px 24px;
    }

    .coach-body::after {
      content: "";
      position: absolute;
      left: 17px;
      top: 12px;
      width: 40px;
      height: 32px;
      border-radius: 50%;
      background: rgba(255, 229, 185, .64);
    }

    .coach-ear {
      top: -6px;
      width: 18px;
      height: 20px;
      border-radius: 50%;
    }

    .coach-ear.left {
      left: 16px;
    }

    .coach-ear.right {
      right: 14px;
    }

    .coach-eye,
    .coach-nose {
      position: absolute;
      border-radius: 50%;
      background: #142033;
      transform: translateZ(10px);
    }

    .coach-eye.left {
      left: 18px;
      top: 23px;
      width: 7px;
      height: 7px;
    }

    .coach-eye.right {
      right: 18px;
      top: 23px;
      width: 7px;
      height: 7px;
    }

    .coach-nose {
      left: 28px;
      top: 34px;
      width: 9px;
      height: 7px;
    }

    .coach-arm {
      top: 57px;
      width: 18px;
      height: 46px;
      border-radius: 999px;
      transform-origin: top center;
    }

    .coach-arm.left {
      left: 0;
      transform: rotate(18deg);
    }

    .coach-arm.right {
      right: 0;
      transform: rotate(-28deg);
      animation: coachWave 1.8s ease-in-out infinite;
    }

    .coach-badge {
      position: absolute;
      left: 50%;
      bottom: 8px;
      transform: translateX(-50%);
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      border-radius: 999px;
      background: rgba(255, 255, 255, .84);
      color: #142033;
      font-size: 12px;
      font-weight: 900;
    }

    .lesson-coach-3d.thinking .coach-character {
      animation-duration: 1.7s;
    }

    .lesson-coach-3d.happy .coach-model-3d {
      background: linear-gradient(160deg, #dcffd7, #e8f7ff 72%);
    }

    .lesson-coach-3d.happy .coach-bubble {
      background: #18864a;
    }

    .lesson-coach-3d.quiz-mode {
      right: clamp(18px, 4vw, 48px);
      bottom: clamp(18px, 4vw, 38px);
      width: min(210px, 30vw);
    }

    @keyframes coachFloat {

      0%,
      100% {
        transform: translateX(-50%) translateY(0) rotateY(-16deg) rotateX(4deg);
      }

      50% {
        transform: translateX(-50%) translateY(-8px) rotateY(14deg) rotateX(1deg);
      }
    }

    @keyframes coachWave {

      0%,
      100% {
        transform: rotate(-28deg);
      }

      50% {
        transform: rotate(-62deg);
      }
    }

    .quiz-screen {
      position: fixed;
      inset: 0;
      z-index: 80;
      display: none;
      place-items: center;
      padding: 28px;
      background:
        radial-gradient(circle at 20% 10%, rgba(255, 228, 107, .42), transparent 28%),
        radial-gradient(circle at 82% 18%, rgba(72, 213, 255, .34), transparent 30%),
        rgba(248, 253, 255, .96);
    }

    .quiz-screen.active {
      display: grid;
    }

    .quiz-card {
      width: min(920px, 100%);
      padding: clamp(22px, 4vw, 42px);
      border: 1px solid rgba(255, 255, 255, .82);
      border-radius: 34px;
      background: rgba(255, 255, 255, .82);
      box-shadow: 0 28px 90px rgba(23, 78, 121, .22);
      backdrop-filter: blur(18px);
    }

    .quiz-top {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
      margin-bottom: 20px;
    }

    .quiz-pill {
      display: inline-flex;
      align-items: center;
      min-height: 38px;
      padding: 0 14px;
      border-radius: 999px;
      background: #fff7d6;
      color: #8a5a00;
      font-weight: 900;
    }

    .quiz-question {
      margin: 14px 0 24px;
      font-size: clamp(28px, 4vw, 48px);
      line-height: 1.2;
      font-weight: 900;
      letter-spacing: 0;
    }

    .quiz-answers {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
    }

    .quiz-answer {
      min-height: 92px;
      padding: 18px;
      border: 2px solid rgba(255, 255, 255, .84);
      border-radius: 24px;
      background: #fff;
      color: #142033;
      cursor: pointer;
      font: inherit;
      font-size: clamp(20px, 2.3vw, 28px);
      font-weight: 900;
      box-shadow: 0 12px 26px rgba(23, 78, 121, .1);
      transition: transform .12s ease, background .12s ease, border-color .12s ease;
    }

    .quiz-answer:hover {
      transform: translateY(-4px);
      border-color: #48d5ff;
      background: #e8f7ff;
    }

    .quiz-answer.correct {
      background: #dcffd7;
      border-color: #74f19c;
    }

    .quiz-answer.wrong {
      background: #ffe0e8;
      border-color: #ff7aa8;
    }

    .quiz-feedback {
      min-height: 38px;
      margin-top: 18px;
      color: #456174;
      font-size: 18px;
      font-weight: 800;
    }

    .quiz-actions {
      display: flex;
      justify-content: flex-end;
      gap: 12px;
      margin-top: 24px;
    }

    canvas#confettiCanvas {
      position: fixed;
      inset: 0;
      z-index: 120;
      width: 100vw;
      height: 100vh;
      pointer-events: none;
    }

    @media (max-width: 720px) {
      .slide-img {
        max-height: calc(100vh - 330px);
      }

      .script-area {
        min-height: 260px;
      }

      .quiz-answers {
        grid-template-columns: 1fr;
      }

      .indicator {
        right: 12px;
        top: 82px;
      }

      .lesson-coach-3d {
        right: 12px;
        bottom: 86px;
        width: 132px;
        min-width: 132px;
        padding: 8px;
      }

      .coach-bubble {
        font-size: 11px;
        padding: 8px;
      }

      .coach-model-3d {
        height: 118px;
      }

      .coach-character {
        scale: .72;
        bottom: 6px;
      }
    }
  </style>
</head>

<body>
  <div class="loading-screen" id="loading">
    <h1>Đang tải bài học...</h1>
  </div>

  <div class="app-container" id="lessonMode">
    <div class="slide-area" id="slideArea"></div>
    <div class="script-area">
      <div class="script-text" id="scriptText"></div>
      <audio id="audioPlayer"></audio>
    </div>
  </div>

  <aside class="lesson-coach-3d" id="lessonCoach3d" aria-label="Nhân vật 3D đồng hành">
    <div class="coach-bubble" id="coachBubble">Chào bé! Mình sẽ học cùng con nhé.</div>
    <div class="coach-model-3d" role="img" aria-label="Bạn Capybara 3D">
      <div class="coach-shadow"></div>
      <div class="coach-character">
        <div class="coach-ear left"></div>
        <div class="coach-ear right"></div>
        <div class="coach-head">
          <span class="coach-eye left"></span><span class="coach-eye right"></span><span class="coach-nose"></span>
        </div>
        <div class="coach-body"></div>
        <div class="coach-arm left"></div>
        <div class="coach-arm right"></div>
      </div>
      <div class="coach-badge">3D Buddy</div>
    </div>
  </aside>

  <div class="quiz-screen" id="quizScreen" aria-live="polite">
    <article class="quiz-card">
      <div class="quiz-top">
        <span class="quiz-pill" id="quizCounter">Quiz 1 / 1</span>
        <span class="quiz-pill" id="quizScore">0 điểm</span>
      </div>
      <h1 class="quiz-question" id="quizQuestion"></h1>
      <div class="quiz-answers" id="quizAnswers"></div>
      <div class="quiz-feedback" id="quizFeedback"></div>
      <div class="quiz-actions">
        <button class="btn" id="reviewBtn">Xem lại bài</button>
        <button class="btn primary" id="nextQuizBtn">Câu tiếp</button>
      </div>
    </article>
  </div>

  <div class="indicator" id="indicator">1 / 1</div>
  <div class="controls">
    <button class="btn" id="prevBtn" title="Trở lại">←</button>
    <button class="btn primary" id="playBtn" title="Nghe lại">Nghe</button>
    <button class="btn" id="nextBtn" title="Tiếp theo">→</button>
    <button class="btn" id="quizBtn" title="Làm quiz">Quiz</button>
  </div>
  <canvas id="confettiCanvas"></canvas>

  <script>
    const slides = ['images/slide-01.png',
            'images/slide-02.png',
            'images/slide-03.png',
            'images/slide-04.png',
            'images/slide-05.png',
            'images/slide-06.png'];
    const rawScripts = [{'num': 1, 'text': "Chào con! Hôm nay chúng mình cùng khám phá hành trình của một hạt đậu nhỏ. Từ một hạt bé xíu, cây đậu có thể nảy mầm, lớn lên và tạo ra nhiều quả đậu mới."},
            {'num': 2, 'text': "Đầu tiên, hạt đậu được gieo vào đất mềm. Khi có nước, không khí và ánh sáng vừa đủ, hạt bắt đầu thức dậy sau một giấc ngủ dài."},
            {'num': 3, 'text': "Sau vài ngày, chiếc rễ trắng nhỏ chui xuống đất để hút nước. Một mầm xanh vươn lên khỏi mặt đất để đón ánh nắng."},
            {'num': 4, 'text': "Mầm non lớn dần thành cây con. Lá xanh giúp cây nhận ánh sáng, còn rễ tiếp tục hút nước và chất dinh dưỡng trong đất."},
            {'num': 5, 'text': "Khi cây trưởng thành, cây có thể ra hoa rồi kết thành quả đậu. Bên trong quả có hạt mới, và một vòng đời mới lại bắt đầu."},
            {'num': 6, 'text': "Con vừa học xong vòng đời của cây đậu: hạt, nảy mầm, cây con, cây trưởng thành, ra quả và tạo hạt mới. Lần tới khi nhìn thấy hạt đậu, con hãy nhớ rằng bên trong hạt nhỏ có cả một mầm sống nhé!"}];
    const quizData = JSON.parse("[{\"question\": \"Hạt đậu cần gì để bắt đầu nảy mầm?\", \"answers\": [\"Đất, nước và ánh sáng\", \"Bánh kẹo\", \"Bút chì\", \"Ti vi\"], \"correct\": \"Đất, nước và ánh sáng\", \"feedback_correct\": \"Đúng rồi! Hạt đậu cần môi trường phù hợp để nảy mầm.\", \"feedback_wrong\": \"Gợi ý: hạt đậu cần đất mềm, nước và ánh sáng vừa đủ.\"}, {\"question\": \"Bộ phận nào chui xuống đất để hút nước?\", \"answers\": [\"Rễ\", \"Hoa\", \"Quả\", \"Lá\"], \"correct\": \"Rễ\", \"feedback_correct\": \"Chính xác! Rễ giúp cây hút nước và chất dinh dưỡng.\", \"feedback_wrong\": \"Gợi ý: phần này thường nằm dưới đất.\"}, {\"question\": \"Lá xanh giúp cây làm gì?\", \"answers\": [\"Nhận ánh sáng\", \"Chạy thật nhanh\", \"Ngủ cả ngày\", \"Biến thành đá\"], \"correct\": \"Nhận ánh sáng\", \"feedback_correct\": \"Giỏi quá! Lá giúp cây nhận ánh sáng để lớn lên.\", \"feedback_wrong\": \"Gợi ý: lá thường xòe ra để đón nắng.\"}, {\"question\": \"Bên trong quả đậu có gì?\", \"answers\": [\"Hạt mới\", \"Cục tẩy\", \"Viên bi\", \"Con thuyền\"], \"correct\": \"Hạt mới\", \"feedback_correct\": \"Đúng rồi! Hạt mới có thể bắt đầu một vòng đời mới.\", \"feedback_wrong\": \"Gợi ý: từ hạt mới, cây đậu mới có thể mọc lên.\"}]");
    const lessonMeta = JSON.parse("{\"title\": \"Vòng đời của cây đậu\", \"grade\": 1, \"subject\": \"Tự nhiên\", \"description\": \"Bài học lớp 1 giúp bé hiểu hạt đậu nảy mầm, lớn lên và ra quả.\", \"geminiApiKey\": \"\"}");
    const AUTO_QUIZ_BATCH_SIZE = 10;
    const AUTO_QUIZ_PREFETCH_REMAINING = 2;
    let currentIdx = 0;
    let quizIdx = 0;
    let quizScore = 0;
    let answered = false;
    let wordTimestamps = [];
    let autoQuizLoading = false;
    let autoQuizBatches = 0;

    const audioPlayer = document.getElementById("audioPlayer");
    const scriptContainer = document.getElementById("scriptText");
    const indicator = document.getElementById("indicator");
    const quizScreen = document.getElementById("quizScreen");
    const quizCounter = document.getElementById("quizCounter");
    const quizScoreEl = document.getElementById("quizScore");
    const quizQuestion = document.getElementById("quizQuestion");
    const quizAnswers = document.getElementById("quizAnswers");
    const quizFeedback = document.getElementById("quizFeedback");
    const nextQuizBtn = document.getElementById("nextQuizBtn");
    const lessonCoach3d = document.getElementById("lessonCoach3d");
    const coachBubble = document.getElementById("coachBubble");

    function escapeHtml(value) {
      return String(value).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/"/g, "&quot;").replace(/'/g, "&#039;");
    }

    async function loadSlide(index) {
      if (index < 0 || index >= slides.length) return;
      hideQuiz();
      currentIdx = index;
      document.querySelectorAll(".slide-img").forEach((img, i) => img.classList.toggle("active", i === index));
      indicator.textContent = `${index + 1} / ${slides.length}`;
      document.getElementById("prevBtn").disabled = index === 0;
      document.getElementById("nextBtn").disabled = index === slides.length - 1 && !quizData.length;

      const slideNum = String(index + 1).padStart(2, "0");
      audioPlayer.src = `audio/slide-${slideNum}.mp3`;
      audioPlayer.playbackRate = 1.08;

      try {
        const response = await fetch(`audio/slide-${slideNum}.json`);
        if (!response.ok) throw new Error("timestamps missing");
        wordTimestamps = await response.json();
        renderScript();
      } catch {
        wordTimestamps = [];
        const fallbackText = rawScripts[index] ? rawScripts[index].text : "Đang phát âm thanh thuyết minh...";
        scriptContainer.innerHTML = `<span style="opacity:.9">${escapeHtml(fallbackText)}</span>`;
      }
      audioPlayer.currentTime = 0;
      audioPlayer.play().catch(() => { });
    }

    function renderScript() {
      scriptContainer.innerHTML = wordTimestamps.map((w, i) => `<span class="word" id="word-${i}">${escapeHtml(w.text)}</span>`).join(" ");
    }

    audioPlayer.ontimeupdate = () => {
      if (!wordTimestamps.length) return;
      const time = audioPlayer.currentTime;
      wordTimestamps.forEach((w, i) => {
        const el = document.getElementById(`word-${i}`);
        if (!el) return;
        const end = Number.isFinite(w.end) ? w.end : (wordTimestamps[i + 1]?.start ?? Number.MAX_SAFE_INTEGER);
        el.classList.toggle("highlight", time >= w.start && time < end);
      });
    };

    audioPlayer.onended = () => {
      if (currentIdx === slides.length - 1 && quizData.length) {
        window.setTimeout(showQuiz, 700);
      }
    };

    function normalizeQuizItem(item, index) {
      const answers = item.answers || item.options || item.choices || [];
      const correct = item.correct ?? item.answer ?? item.correct_answer ?? answers[item.correctIndex] ?? answers[0];
      return {
        question: item.question || item.q || `Câu hỏi ${index + 1}`,
        answers,
        correct,
        feedbackCorrect: item.explanation || item.feedback_correct || item.feedbackCorrect || item.feedback || "Giỏi lắm, bé đã chọn đúng!",
        feedbackWrong: item.feedback_wrong || item.feedbackWrong || `Gần đúng rồi. Đáp án đúng là: ${correct}`
      };
    }

    function getGeminiApiKey() {
      const paramsKey = new URLSearchParams(window.location.search).get("geminiKey");
      if (paramsKey) return paramsKey.trim();
      if (lessonMeta.geminiApiKey) return String(lessonMeta.geminiApiKey).trim();
      try {
        const appState = JSON.parse(localStorage.getItem("hoc_ma_choi_state_v2") || "{}");
        return String(appState.geminiApiKey || "").trim();
      } catch {
        return "";
      }
    }

    function buildAutoQuizPrompt() {
      const existingQuestions = quizData.map((item, index) => `${index + 1}. ${normalizeQuizItem(item, index).question}`).join("\n");
      const slideSummary = rawScripts.map((item) => item.text).filter(Boolean).join("\n").slice(0, 3600);
      return `Bạn là giáo viên tiểu học Việt Nam. Hãy tạo thêm ${AUTO_QUIZ_BATCH_SIZE} câu hỏi trắc nghiệm mới, cùng chủ đề với bài học sau.
Tên bài: ${lessonMeta.title || "Bài học"}
Lớp: ${lessonMeta.grade || "tiểu học"}
Môn/chủ đề: ${lessonMeta.subject || "Khám phá"}

Nội dung bài học:
${slideSummary}

Các câu đã có, KHÔNG lặp lại ý hoặc đáp án:
${existingQuestions}

Yêu cầu:
- Phù hợp trẻ em, tiếng Việt rõ ràng.
- Mỗi câu có 4 đáp án ngắn, chỉ 1 đáp án đúng.
- Độ khó tăng nhẹ nhưng vẫn bám sát cùng chủ đề.
- Trả về JSON array thuần, không markdown.
Schema:
[{"question":"...","answers":["...","...","...","..."],"correct":"...","feedback_correct":"...","feedback_wrong":"..."}]`;
    }

    function pickLessonTerms(limit = 10) {
      const source = [
        lessonMeta.title || "",
        lessonMeta.subject || "",
        ...rawScripts.map((item) => item.text || "")
      ].join(" ");
      const stopWords = new Set("và là có của cho trong một những các con bài học chúng mình hãy cùng được với thật này nhé rồi hôm nay".split(" "));
      const terms = source.toLowerCase().normalize("NFC").match(/[a-zà-ỹđ0-9]{2,}/gi) || [];
      const counts = new Map();
      terms.forEach((term) => {
        const key = term.trim();
        if (!key || stopWords.has(key)) return;
        counts.set(key, (counts.get(key) || 0) + 1);
      });
      return [...counts.entries()].sort((a, b) => b[1] - a[1]).map(([term]) => term).slice(0, limit);
    }

    function generateLocalQuizBatch() {
      const title = lessonMeta.title || "bài học";
      const subject = lessonMeta.subject || "Khám phá";
      const terms = pickLessonTerms(12);
      const mainTerm = terms[0] || title;
      const batch = Math.max(1, autoQuizBatches || 1);
      const templates = [
        ["Bài học này đang nói về chủ đề nào?", [title, "Nấu ăn", "Thể thao", "Đi ngủ"], title],
        ["Môn hoặc nhóm kiến thức của bài là gì?", [subject, "Mỹ thuật tự do", "Thể dục", "Âm nhạc"], subject],
        ["Khi làm quiz, bé nên làm gì trước?", ["Đọc kỹ câu hỏi", "Bấm thật nhanh", "Bỏ qua đáp án", "Tắt bài học"], "Đọc kỹ câu hỏi"],
        ["Từ khóa nào gần với nội dung bài học?", [mainTerm, "bánh kem", "tàu vũ trụ", "đá bóng"], mainTerm],
        ["Nếu trả lời sai, bé nên làm gì?", ["Đọc gợi ý và thử lại", "Bỏ cuộc ngay", "Không học nữa", "Đóng trình duyệt"], "Đọc gợi ý và thử lại"],
        ["Phần hình minh họa giúp bé làm gì?", ["Quan sát và hiểu bài", "Che mất nội dung", "Làm bài khó hơn", "Không cần nhìn"], "Quan sát và hiểu bài"],
        ["Bé nên ghi nhớ điều gì sau mỗi slide?", ["Ý chính của bài", "Màu nút bấm", "Tên trình duyệt", "Số dây điện"], "Ý chính của bài"],
        ["Quiz có tác dụng gì?", ["Ôn lại kiến thức", "Xóa bài học", "Tắt âm thanh", "Đổi máy tính"], "Ôn lại kiến thức"],
        ["Khi nghe lời dẫn, bé nên làm gì?", ["Lắng nghe và nhìn hình", "Nói chuyện thật to", "Bỏ qua slide", "Nhắm mắt lại"], "Lắng nghe và nhìn hình"],
        ["Bài học phù hợp nhất với ai?", ["Học sinh tiểu học", "Người lái xe", "Đầu bếp nhà hàng", "Vận động viên chuyên nghiệp"], "Học sinh tiểu học"]
      ];
      return templates.map(([question, answers, correct], index) => ({
        question: batch > 1 ? `${question} (luyện thêm ${batch}.${index + 1})` : question,
        answers,
        correct,
        feedback_correct: "Đúng rồi! Bé đã ôn lại bài rất tốt.",
        feedback_wrong: `Gợi ý: đáp án đúng là "${correct}".`
      })).slice(0, AUTO_QUIZ_BATCH_SIZE);
    }

    function appendQuizItems(generated) {
      const normalized = generated.map((item, index) => normalizeQuizItem(item, index)).filter((item) => item.question && item.answers.length >= 2 && item.correct);
      const known = new Set(quizData.map((item, index) => normalizeQuizItem(item, index).question.toLowerCase().trim()));
      let added = 0;
      normalized.forEach((item) => {
        const key = item.question.toLowerCase().trim();
        if (!known.has(key)) {
          known.add(key);
          quizData.push(item);
          added += 1;
        }
      });
      return added;
    }

    async function requestMoreQuizQuestions() {
      const apiKey = getGeminiApiKey();
      if (autoQuizLoading) return;
      autoQuizLoading = true;
      autoQuizBatches += 1;
      setCoachMood("thinking", "Mình đang chuẩn bị thêm 10 câu cùng chủ đề...");
      try {
        if (!apiKey) {
          const added = appendQuizItems(generateLocalQuizBatch());
          quizFeedback.textContent = `Đã mở thêm ${added} câu luyện tập cùng chủ đề cho bé.`;
          quizCounter.textContent = `Quiz ${quizIdx + 1} / ${quizData.length}`;
          nextQuizBtn.textContent = quizIdx === quizData.length - 1 ? "Quay lại" : "Câu tiếp";
          setCoachMood("happy", `Đã có thêm ${added} câu mới để luyện tiếp!`);
          return;
        }
        const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${encodeURIComponent(apiKey)}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            contents: [{ parts: [{ text: buildAutoQuizPrompt() }] }],
            generationConfig: { response_mime_type: "application/json" }
          })
        });
        const data = await response.json();
        if (!response.ok || data.error) throw new Error(data.error?.message || "Không tạo được câu hỏi mới");
        const text = data.candidates?.[0]?.content?.parts?.[0]?.text || "[]";
        const generated = JSON.parse(text.replace(/```json|```/g, "").trim());
        const newItems = generated.map(normalizeQuizItem).filter((item) => item.question && item.answers.length >= 2 && item.correct);
        const known = new Set(quizData.map((item, index) => normalizeQuizItem(item, index).question.toLowerCase().trim()));
        newItems.forEach((item) => {
          const key = item.question.toLowerCase().trim();
          if (!known.has(key)) {
            known.add(key);
            quizData.push(item);
          }
        });
        quizFeedback.textContent = `Đã mở thêm ${newItems.length} câu luyện tập cùng chủ đề cho bé.`;
        quizCounter.textContent = `Quiz ${quizIdx + 1} / ${quizData.length}`;
        nextQuizBtn.textContent = quizIdx === quizData.length - 1 ? "Quay lại" : "Câu tiếp";
        setCoachMood("happy", `Đã có thêm ${newItems.length} câu mới để luyện tiếp!`);
      } catch (error) {
        console.warn("Auto quiz generation failed", error);
        const added = appendQuizItems(generateLocalQuizBatch());
        if (added > 0) {
          quizFeedback.textContent = `Đã mở thêm ${added} câu luyện tập local cho bé.`;
          quizCounter.textContent = `Quiz ${quizIdx + 1} / ${quizData.length}`;
          nextQuizBtn.textContent = quizIdx === quizData.length - 1 ? "Quay lại" : "Câu tiếp";
          setCoachMood("happy", `Đã có thêm ${added} câu mới để luyện tiếp!`);
          return;
        }
        autoQuizBatches -= 1;
        setCoachMood("thinking", "Chưa tạo thêm được câu mới, mình vẫn ở đây hỗ trợ bé.");
      } finally {
        autoQuizLoading = false;
      }
    }

    function maybeGenerateMoreQuiz() {
      const remaining = quizData.length - quizIdx - 1;
      if (remaining <= AUTO_QUIZ_PREFETCH_REMAINING) requestMoreQuizQuestions();
    }

    function showQuiz() {
      if (!quizData.length) return;
      audioPlayer.pause();
      quizScreen.classList.add("active");
      lessonCoach3d.classList.add("quiz-mode");
      quizIdx = Math.min(quizIdx, quizData.length - 1);
      renderQuiz();
    }

    function hideQuiz() {
      quizScreen.classList.remove("active");
      lessonCoach3d.classList.remove("quiz-mode");
    }

    function returnToPreviousPage() {
      if (window.history.length > 1) {
        window.history.back();
        return;
      }
      hideQuiz();
      loadSlide(Math.max(0, slides.length - 1));
    }

    function renderQuiz() {
      answered = false;
      const item = normalizeQuizItem(quizData[quizIdx], quizIdx);
      quizCounter.textContent = `Quiz ${quizIdx + 1} / ${quizData.length}`;
      quizScoreEl.textContent = `${quizScore} điểm`;
      quizQuestion.textContent = item.question;
      quizFeedback.textContent = "";
      nextQuizBtn.textContent = quizIdx === quizData.length - 1 ? "Quay lại" : "Câu tiếp";
      nextQuizBtn.disabled = true;
      quizAnswers.innerHTML = item.answers.map((answer, index) => `<button class="quiz-answer" data-index="${index}">${escapeHtml(answer)}</button>`).join("");
      quizAnswers.querySelectorAll(".quiz-answer").forEach((button) => button.addEventListener("click", () => answerQuiz(button, item)));
      setCoachMood("idle", `Câu ${quizIdx + 1}: đọc kỹ rồi chọn đáp án nhé!`);
      maybeGenerateMoreQuiz();
    }

    function setCoachMood(mood, message) {
      lessonCoach3d.classList.remove("idle", "happy", "thinking");
      lessonCoach3d.classList.add(mood || "idle");
      if (message) coachBubble.textContent = message;
    }

    function answerQuiz(button, item) {
      if (answered) return;
      answered = true;
      const selected = item.answers[Number(button.dataset.index)];
      const isCorrect = selected === String(item.correct);
      quizAnswers.querySelectorAll(".quiz-answer").forEach((btn) => {
        const value = item.answers[Number(btn.dataset.index)];
        btn.classList.toggle("correct", value === String(item.correct));
        btn.classList.toggle("wrong", btn === button && !isCorrect);
      });
      if (isCorrect) {
        quizScore += 10;
        quizScoreEl.textContent = `${quizScore} điểm`;
        quizFeedback.textContent = item.feedbackCorrect;
        celebrate();
        playSuccessTone();
        setCoachMood("happy", "Tuyệt vời! Bé trả lời đúng rồi.");
      } else {
        quizFeedback.textContent = item.feedbackWrong;
        setCoachMood("thinking", "Không sao, mình cùng xem lại gợi ý nhé.");
      }
      nextQuizBtn.disabled = false;
    }

    function celebrate() {
      if (window.confetti) {
        const canvas = document.getElementById("confettiCanvas");
        const fire = window.confetti.create(canvas, { resize: true, useWorker: true });
        fire({ particleCount: 120, spread: 72, origin: { y: .68 }, scalar: 1.1 });
        fire({ particleCount: 80, angle: 60, spread: 55, origin: { x: 0, y: .78 } });
        fire({ particleCount: 80, angle: 120, spread: 55, origin: { x: 1, y: .78 } });
      } else {
        document.body.animate([{ filter: "brightness(1.18)" }, { filter: "brightness(1)" }], { duration: 520 });
      }
    }

    function playSuccessTone() {
      const AudioContext = window.AudioContext || window.webkitAudioContext;
      if (!AudioContext) return;
      const ctx = new AudioContext();
      [523.25, 659.25, 783.99].forEach((freq, index) => {
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.frequency.value = freq;
        osc.type = "sine";
        gain.gain.setValueAtTime(0.001, ctx.currentTime + index * 0.08);
        gain.gain.exponentialRampToValueAtTime(0.08, ctx.currentTime + index * 0.08 + 0.02);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + index * 0.08 + 0.24);
        osc.connect(gain).connect(ctx.destination);
        osc.start(ctx.currentTime + index * 0.08);
        osc.stop(ctx.currentTime + index * 0.08 + 0.26);
      });
    }

    function init() {
      const slideArea = document.getElementById("slideArea");
      slides.forEach((src, i) => {
        const img = document.createElement("img");
        img.src = src;
        img.alt = `Slide ${i + 1}`;
        img.className = "slide-img";
        slideArea.appendChild(img);
      });
      document.getElementById("prevBtn").onclick = () => loadSlide(currentIdx - 1);
      document.getElementById("nextBtn").onclick = () => currentIdx === slides.length - 1 && quizData.length ? showQuiz() : loadSlide(currentIdx + 1);
      document.getElementById("playBtn").onclick = () => { audioPlayer.currentTime = 0; audioPlayer.play().catch(() => { }); };
      document.getElementById("quizBtn").onclick = showQuiz;
      document.getElementById("reviewBtn").onclick = () => loadSlide(0);
      nextQuizBtn.onclick = () => {
        if (quizIdx < quizData.length - 1) {
          quizIdx += 1;
          renderQuiz();
        } else {
          returnToPreviousPage();
        }
      };
      document.getElementById("loading").style.display = "none";
      loadSlide(0);
    }

    window.onload = init;
    document.addEventListener("keydown", (e) => {
      if (quizScreen.classList.contains("active")) return;
      if (e.key === "ArrowRight") document.getElementById("nextBtn").click();
      if (e.key === "ArrowLeft") loadSlide(currentIdx - 1);
      if (e.key === " ") {
        audioPlayer.paused ? audioPlayer.play().catch(() => { }) : audioPlayer.pause();
        e.preventDefault();
      }
    });
  </script>
</body>
